# Role-based UI hiding (CLAUDE.md §4 + Testing Standards: "driver does NOT see dispatcher-only UI").
# A DRIVER account must NOT see the dispatcher-only Drivers / Customers bottom tabs; Jobs + Profile
# tabs are always present. Deterministic — run with the api-driver account.
# Primary navigation is now the bottom tab bar (Phase 1 §3.2): tabs carry testIDs tab-jobs,
# tab-drivers, tab-customers, tab-profile.
#
# Run (native Windows — emulator + adb + Maestro; see docs/SMOKE_TESTING.md for the full recipe):
#   maestro test \
#     -e SITE_URL=https://tq-pro-teams-php8.ddev.site \
#     -e CLIENT_ID=... -e CLIENT_SECRET=... \
#     -e TQ_USERNAME=api-driver -e TQ_PASSWORD=... \
#     .maestro/roles.yaml
# NEVER hardcode credentials — pass via -e. No `env:` block (in Maestro 2.6 it overrides -e; see smoke.yaml).
appId: com.transitteam.app
---
# Onboarding → login → jobs list (as the driver account).
- runFlow: subflows/auth.yaml

# Assert the screen actually loaded BEFORE the negative checks, so an absent tab can't be a
# false-green from the page simply not having rendered.
- assertVisible: "Jobs"
- assertVisible:
    id: "tab-jobs"
- assertVisible:
    id: "tab-profile"

# The dispatcher-only tabs must be absent for a driver (layout gates them via href: null).
- assertNotVisible:
    id: "tab-drivers"
- assertNotVisible:
    id: "tab-customers"
