# Reusable full auth path: fresh launch → onboarding → login → jobs list visible.
# Composed from the granular building blocks so the test ladder (steps/) and the end-to-end
# flows (smoke.yaml / offline.yaml) share one source of truth. Invoked via `runFlow`.
# Env vars (SITE_URL, CLIENT_ID, CLIENT_SECRET, TQ_USERNAME, TQ_PASSWORD) are inherited from the caller.
appId: com.transitteam.app
---
- runFlow: launch.yaml
- runFlow: onboarding.yaml
- runFlow: login.yaml
