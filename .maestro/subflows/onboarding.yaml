# Building block: complete onboarding (site URL + client creds) → lands on the login screen.
# PRECONDITION: the onboarding screen is showing (run subflows/launch.yaml first).
# Needs env: SITE_URL, CLIENT_ID, CLIENT_SECRET (inherited from the calling flow, passed via -e).
#
# ROBUSTNESS (why the extra steps):
#  - tap → waitForAnimationToEnd BEFORE inputText: Maestro otherwise fires inputText before the
#    field is focused + keyboard is ready, so keystrokes drop / focus skips to the next box.
#  - DISMISS the keyboard between fields by tapping a blank upper area (NOT `hideKeyboard`): the form
#    centres its content, so with the keyboard open the lower fields (esp. Client Secret) sit UNDER
#    the keyboard — tapping an obscured field doesn't focus it, so the next inputText leaks into the
#    field above. `hideKeyboard` would dismiss it, BUT on Android Maestro implements hideKeyboard as a
#    BACK press, which from this root screen EXITS THE APP (process dies → home screen). Tapping blank
#    space blurs the input + dismisses the keyboard via keyboardShouldPersistTaps="handled", no BACK.
#    (Both diagnosed 2026-05-31 via .maestro/steps/diag-input.yaml.)
#  - assertVisible after each VISIBLE field: read-back check that the value actually landed.
#  - Client Secret is masked (secureTextEntry) → its value can't be read back; entered last, and the
#    post-submit validation-error checks below catch it if it didn't land.
appId: com.transitteam.app
---
- tapOn:
    id: "onboarding-site-url"
- waitForAnimationToEnd
- inputText: "${SITE_URL}"
- assertVisible: "${SITE_URL}"
- tapOn:
    point: "50%,10%"          # dismiss keyboard (blank area) so the next field isn't obscured

- tapOn:
    id: "onboarding-client-id"
- waitForAnimationToEnd
- inputText: "${CLIENT_ID}"
- assertVisible: "${CLIENT_ID}"
- tapOn:
    point: "50%,10%"

- tapOn:
    id: "onboarding-client-secret"
- waitForAnimationToEnd
- inputText: "${CLIENT_SECRET}"
- tapOn:
    point: "50%,10%"

# Settle + re-confirm the URL is still present BEFORE submitting (avoids racing the submit tap).
- waitForAnimationToEnd
- assertVisible: "${SITE_URL}"
- tapOn:
    id: "onboarding-submit"

# The form must NOT have been submitted empty (these errors appear only on a blank/partial form).
- assertNotVisible: "Enter your site URL."
- assertNotVisible: "Enter your client ID and secret."

# Landed on the login screen.
- assertVisible: "Sign in"
- assertVisible:
    id: "login-username"
