# Building block: sign in → /configuration seeds the local DB → lands on the jobs list.
# PRECONDITION: the login screen is showing (run subflows/onboarding.yaml first).
# Needs env: TQ_USERNAME, TQ_PASSWORD (inherited from the calling flow, passed via -e).
# Needs the emulator able to reach DDEV — see docs/SMOKE_TESTING.md (DNS responder + 10.0.2.2).
#
# Same input-robustness as onboarding:
#  - tap → waitForAnimationToEnd BEFORE inputText, so keystrokes aren't dropped.
#  - DISMISS the keyboard between fields by tapping a blank upper area, NOT `hideKeyboard` (which on
#    Android Maestro implements as a BACK press → exits the app from this screen). The blank tap blurs
#    the field + dismisses the keyboard via keyboardShouldPersistTaps="handled". (See onboarding.yaml.)
#  - assertVisible after the (visible) username = read-back that it landed. Password is masked → not
#    asserted; if it failed to land the login API call fails and the "Jobs" assert below catches it.
appId: com.transitteam.app
---
- tapOn:
    id: "login-username"
- waitForAnimationToEnd
- inputText: "${TQ_USERNAME}"
- assertVisible: "${TQ_USERNAME}"
- tapOn:
    point: "50%,10%"

- tapOn:
    id: "login-password"
- waitForAnimationToEnd
- inputText: "${TQ_PASSWORD}"
- tapOn:
    point: "50%,10%"

- waitForAnimationToEnd
- tapOn:
    id: "login-submit"

# Authenticated landing: the jobs list (seeded into the local DB).
- assertVisible: "Jobs"
