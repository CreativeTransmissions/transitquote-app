# Smoke test — the M1 happy path: onboarding → login → jobs list → job detail → status update.
# Run (from WSL2, emulator on the Windows host — see docs/SMOKE_TESTING.md):
#   maestro test \
#     -e SITE_URL=https://tq-pro-teams-php8.ddev.site \
#     -e CLIENT_ID=... -e CLIENT_SECRET=... \
#     -e TQ_USERNAME=api-driver -e TQ_PASSWORD=... \
#     .maestro/smoke.yaml
# NEVER hardcode credentials here — they are passed via -e (env) at runtime.
# NOTE: this mutates a test job's status on the live DDEV site.
appId: com.transitteam.app
env:
  SITE_URL: ""
  CLIENT_ID: ""
  CLIENT_SECRET: ""
  TQ_USERNAME: ""
  TQ_PASSWORD: ""
---
# Onboarding → login → jobs list (shared with offline.yaml).
- runFlow: subflows/auth.yaml

# --- Open the first job ---
- tapOn:
    id: "job-card-.*"
    index: 0

# --- Job detail: update status (confirm dialog is native — tapped by text) ---
- assertVisible:
    id: "job-update-status"
- tapOn:
    id: "job-update-status"
- tapOn:
    id: "status-option-.*"
    index: 1
- tapOn: "Confirm"

# --- Back to the list ---
- tapOn:
    id: "job-back"
- assertVisible: "Jobs"
